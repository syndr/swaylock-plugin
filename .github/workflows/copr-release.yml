name: COPR release

on:
  release:
    types: [published]

jobs:
  copr:
    runs-on: ubuntu-latest
    container: fedora:44

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Install packaging tools
        run: |
          dnf -y install \
            copr-cli \
            cargo-rpm-macros \
            curl \
            git \
            meson \
            rpm-build \
            rpmdevtools \
            tar \
            gzip

      - name: Configure COPR authentication
        run: |
          install -d -m 0700 ~/.config
          cat > ~/.config/copr <<'COPR_CONFIG'
          ${{ secrets.COPR_API_TOKEN }}
          COPR_CONFIG
          chmod 0600 ~/.config/copr

      - name: Build source RPMs
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          meson_version="$(sed -nE "s/[[:space:]]*version: '([^']+)'.*/\1/p" meson.build | head -n1)"
          if [ "${version}" != "${meson_version}" ]; then
            echo "release tag version ${version} does not match meson.build version ${meson_version}" >&2
            exit 1
          fi

          topdir="${PWD}/rpmbuild"
          mkdir -p "${topdir}/SOURCES" "${topdir}/SRPMS"

          git archive \
            --format=tar.gz \
            --prefix="swaylock-plugin-${version}/" \
            --output="${topdir}/SOURCES/swaylock-plugin-${version}.tar.gz" \
            HEAD

          windowtolayer_version="$(sed -nE 's/^Version:[[:space:]]+([^[:space:]]+)/\1/p' contrib/rpm/windowtolayer.spec | head -n1)"
          curl --fail --location \
            --output "${topdir}/SOURCES/windowtolayer-v${windowtolayer_version}.tar.gz" \
            "https://gitlab.freedesktop.org/mstoeckl/windowtolayer/-/archive/v${windowtolayer_version}/windowtolayer-v${windowtolayer_version}.tar.gz"

          rpmbuild -bs \
            --define "_topdir ${topdir}" \
            --define "pkg_version ${version}" \
            contrib/rpm/swaylock-plugin.spec

          rpmbuild -bs \
            --define "_topdir ${topdir}" \
            contrib/rpm/windowtolayer.spec

      - name: Submit source RPMs to COPR
        run: |
          set -euo pipefail

          for srpm in rpmbuild/SRPMS/*.src.rpm; do
            copr-cli build syndr/swaylock-plugin "${srpm}"
          done

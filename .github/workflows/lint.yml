name: Lint

# Shellcheck gate for the shell scripts this repo ships (contrib tooling and
# the root example scripts). C code is covered by ci.yml's RPM rebuild.
on:
  pull_request:
    paths:
      - 'contrib/**'
      - 'example_*.sh'
      - '.github/workflows/lint.yml'
  push:
    branches: [main]
    paths:
      - 'contrib/**'
      - 'example_*.sh'
      - '.github/workflows/lint.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck
        run: |
          set -euo pipefail
          # Executables under contrib/ with a shell shebang, plus root example
          # shell scripts. Not all contrib files are shell (python, specs).
          mapfile -t files < <(
            { find contrib -type f \( -name '*.sh' -o -perm -u+x \) -print
              ls example_*.sh 2>/dev/null; } | sort -u
          )
          shell_files=()
          for f in "${files[@]}"; do
            head -1 "$f" | grep -qE '^#!.*(ba)?sh' && shell_files+=("$f")
          done
          printf 'checking: %s\n' "${shell_files[@]}"
          # warning+ fails the build; style/info stay visible in the log only
          # (the upstream example scripts are not held to style rules).
          shellcheck --severity=warning "${shell_files[@]}"
